<!DOCTYPE html>
<html>
<head>
    <title>DOM Manipulation Experiment</title>
    <style>
     body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
    text-align: center;
}

/* Main Container */
.container {
    width: 600px;
    margin: 50px auto;
    padding: 20px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 0 10px gray;
}

/* Buttons */
button {
    padding: 8px 12px;
    margin: 5px;
    background-color: #007bff;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    transition: 0.3s;
}

/* Button Hover Effect */
button:hover {
    background-color: #0056b3;
}

/* Input Box */
input {
    padding: 8px;
    width: 250px;
    border: 1px solid #ccc;
    border-radius: 5px;
    outline: none;
}

/* Input Focus Effect */
input:focus {
    border-color: #007bff;
    box-shadow: 0 0 5px rgba(0, 123, 255, 0.5);
}

/* Paragraph Styling */
#para {
    margin-top: 20px;
    font-size: 18px;
    color: #333;
}
    </style>
</head>
<body>
    <h1 id="heading">Welcome to JavaScript DOM</h1>
    <input type="text" id="inputText" placeholder="Enter your message">
    <br><br>
    <button id="changeTextBtn">Change Heading</button>
    <button id="colorBtn">Change Background</button>
    <button id="fontBtn">Change Font Size</button>
    <button id="toggleBtn">Show/Hide Paragraph</button>
    <button id="resetBtn">Reset</button>
    <p id="para">This is a sample paragraph.</p>
    <script src="script_e6.js"></script>
</body>
</html>
